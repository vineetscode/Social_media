name: JabWeMet CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: jabwemet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Validate Prisma Schema
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/jabwemet_test?schema=public

      - name: Run Linter
        run: npm run lint
        continue-on-error: true # Allow soft warnings in initial stages

      - name: Run Test Suite
        run: npm run test
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/jabwemet_test?schema=public

      - name: Build Standalone Web Application
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:password123@localhost:5432/jabwemet_test?schema=public
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: dummy_cloud

  deploy:
    name: Deploy to Production
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Deployment boilerplate (Railway deployment example)
      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
